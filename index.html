<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Primary Meta Tags -->
    <title>SafeShip - Sistema de Inspeções de Equipamentos</title>
    <meta name="title" content="SafeShip - Sistema de Inspeções de Equipamentos" />
    <meta name="description" content="Sistema completo de gerenciamento de inspeções de equipamentos de segurança marítima. Controle inspeções, manutenções e certificados." />
    <meta name="author" content="SafeShip" />
    <meta name="keywords" content="inspeções, equipamentos, segurança, marítima, manutenção, certificados, offshore" />
    
    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#003366" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SafeShip" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://safeship.app/" />
    <meta property="og:title" content="SafeShip - Sistema de Inspeções de Equipamentos" />
    <meta property="og:description" content="Sistema completo de gerenciamento de inspeções de equipamentos de segurança marítima." />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://safeship.app/" />
    <meta name="twitter:title" content="SafeShip - Sistema de Inspeções" />
    <meta name="twitter:description" content="Sistema completo de gerenciamento de inspeções de equipamentos de segurança marítima." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Prevent phone number detection on iOS -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
